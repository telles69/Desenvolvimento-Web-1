<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 20/02</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Fallen</h1>
    <h2>Rei da perfeitinha</h2>
    <img class="foto-principal" src="https://pbs.twimg.com/media/FMxySCdXsAg45JU.jpg" alt="Foto do Fallen">
    
    <p>Comente:</p>
    <form id="formComentario">
        <input class="campo-usuario" type="text" id="usuario" placeholder="Seu nome" required>
        <input class="campo-comentario" type="text" id="comentario" placeholder="O que você gostaria de comentar?" required>
        <button type="submit">Enviar</button>
    </form>
    
    <hr>
    
    <div id="listaComentarios">
        
    </div>

    <script>
        const API_URL = "http://localhost:3000";

        function renderizarComentarios(comentarios) {
            const lista = document.getElementById("listaComentarios");
            lista.innerHTML = "";
            
            comentarios.forEach(comentario => {
                const divComentario = document.createElement("div");
                divComentario.className = "comentario";
                divComentario.innerHTML = `
                    <img class="comentario-avatar" src="${comentario.avatar}" alt="Avatar de ${comentario.usuario}">
                    <p class="comentario-usuario"><strong>${comentario.usuario}</strong></p>
                    <p>${comentario.texto}</p>
                `;
                lista.appendChild(divComentario);
            });
        }
        async function carregarComentarios() {
            try {
                const response = await fetch(`${API_URL}/comentarios`);
                const comentarios = await response.json();
                renderizarComentarios(comentarios);
            } catch (erro) {
                console.error("Erro ao carregar comentários:", erro);
            }
        }

        document.getElementById("formComentario").addEventListener("submit", async (event) => {
            event.preventDefault();
            
            const usuario = document.getElementById("usuario").value;
            const texto = document.getElementById("comentario").value;
            
            try {
                const response = await fetch(`${API_URL}/comentarios`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ usuario, texto })
                });
                
                if (response.ok) {
                    document.getElementById("comentario").value = "";
                    
                    await carregarComentarios();
                } else {
                    alert("Erro ao enviar comentário");
                }
            } catch (erro) {
                console.error("Erro ao enviar comentário:", erro);
                alert("Erro ao enviar comentário. Verifique se o servidor está rodando.");
            }
        });
        carregarComentarios();
    </script>
</body>
</html>
